services:
  nginx:
    image: nginx:1.25-alpine
    container_name: mall-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mysql:
    image: mysql:8.0
    container_name: mall-mysql
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mall
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    container_name: mall-redis
    ports:
      - "6380:6379"

  tairstring:
    image: tairmodule/tairstring:latest
    container_name: mall-tairstring
    ports:
      - "6381:6379"

  # oceanbase:
  #   image: oceanbase/oceanbase-ce:latest
  #   container_name: mall-oceanbase-ce
  #   environment:
  #     MODE: mini
  #     OB_MEMORY_LIMIT: 6G
  #     OB_DATAFILE_SIZE: 4G
  #     OB_LOG_DISK_SIZE: 4G
  #   ports:
  #     - "2881:2881"
  #     - "2882:2882"
  oceanbase:
    image: oceanbase/oceanbase-ce:latest
    container_name: mall-oceanbase-ce
    mem_limit: 18g
    cpus: "6.0"
    environment:
      MODE: normal
      OB_MEMORY_LIMIT: 12G
      OB_SYSTEM_MEMORY: 2G
      OB_TENANT_MINI_CPU: 4
      OB_TENANT_MEMORY_SIZE: 10G
      OB_DATAFILE_SIZE: 20G
      OB_LOG_DISK_SIZE: 20G
      OB_TENANT_PASSWORD: root
    ports:
      - "2881:2881"
      - "2882:2882"
    volumes:
    - oceanbase-data:/root/ob
    - oceanbase-conf:/root/.obd/cluster

  rabbitmq:
    image: rabbitmq:3-management
    container_name: mall-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: mall
      RABBITMQ_DEFAULT_PASS: mall

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: mall-nacos
    environment:
      MODE: standalone
    ports:
      - "18848:8848"
      - "19848:9848"
      - "19849:9849"

  sentinel:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: mall-sentinel
    ports:
      - "18858:8858"

  seata:
    image: seataio/seata-server
    container_name: mall-seata
    ports:
      - "8091:8091"
      - "7091:7091"
    environment:
      SEATA_PORT: 8091
      STORE_MODE: file

  canal:
    image: canal/canal-server:v1.1.7
    container_name: mall-canal
    depends_on:
      - mysql
    environment:
      canal.instance.master.address: mysql:3306
      canal.instance.dbUsername: canal
      canal.instance.dbPassword: canal
      canal.instance.connectionCharset: UTF-8
      canal.instance.tsdb.enable: "false"
      canal.instance.gtidon: "false"
    ports:
      - "12111:11111"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: mall-prometheus
    ports:
      - "19090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.3.0
    container_name: mall-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
  oceanbase-data:
  oceanbase-conf: